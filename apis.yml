aid: cloudwell-opal
name: Cloudwell
description: >-
  Cloudwell (cloudwell.io) is a Microsoft 365 and Azure-focused software
  partner founded in 2012, offering a suite of SharePoint and Teams apps:
  Calendar Overlay, Org Chart, Staff Directory, Team Members, and Viva
  Announcements - all distributed via Microsoft AppSource. Cloudwell does
  not publish a public REST API; their products are consumed inside
  SharePoint Online, Microsoft Teams, and Viva Connections via SharePoint
  Framework (SPFx) web parts and the Microsoft Graph API. The "opal"
  suffix in this repository name is preserved for index continuity but
  Cloudwell does not currently ship a product named Opal.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/cloudwell-opal/refs/heads/main/apis.yml
created: '2024-01-01'
modified: '2026-04-25'
specificationVersion: '0.19'
kind: company
tags:
