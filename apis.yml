  - Calendar Overlay
  - Microsoft 365
  - Microsoft Partner
  - Org Chart
  - SharePoint
  - SPFx
  - Staff Directory
  - Teams
  - Viva Connections
apis:
  - aid: cloudwell-opal:calendar-overlay
    name: Cloudwell Calendar Overlay
    tags:
      - Calendar
      - SharePoint
      - SPFx
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://appsource.microsoft.com/en-us/product/web-apps/cloudwell.cloudwell_calendar_overlay
    properties:
      - url: https://appsource.microsoft.com/en-us/product/web-apps/cloudwell.cloudwell_calendar_overlay
        type: AppSource Listing
      - url: https://learn.microsoft.com/en-us/microsoft-365-app-certification/sharepoint/cloudwell-calendar-overlay
        type: Microsoft 365 App Certification
    description: >-
      Calendar Overlay is Cloudwell's flagship SharePoint app for combining
      SharePoint lists and libraries, Outlook and Exchange calendars,
      Planner plans, and iCalendar feeds into a unified calendar surface.
      Configured inside SharePoint Online; no public REST API.
  - aid: cloudwell-opal:org-chart
    name: Cloudwell Org Chart
    tags:
      - Directory
      - Org Chart
      - SharePoint
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://cloudwell.io/products/org-chart/
    properties:
      - url: https://cloudwell.io/products/org-chart/
        type: Product Page
    description: >-
      Org Chart for SharePoint and Microsoft Teams renders an interactive
      organization hierarchy from Entra ID/Azure AD reporting structure.
      Distributed as an SPFx solution; no public REST API.
  - aid: cloudwell-opal:staff-directory
    name: Cloudwell Staff Directory
    tags:
      - Directory
      - SharePoint
      - Teams
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://cloudwell.io/products/staff-directory/
    properties:
      - url: https://cloudwell.io/products/staff-directory/
        type: Product Page
    description: >-
      Staff Directory provides searchable, filterable employee directories
      across SharePoint and Teams, sourced from Microsoft Graph and Entra
      ID. Distributed as an SPFx solution; no public REST API.
  - aid: cloudwell-opal:team-members
    name: Cloudwell Team Members
    tags:
      - Groups
      - SharePoint
      - Teams
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://learn.microsoft.com/en-us/microsoft-365-app-certification/sharepoint/cloudwell-team-members
    properties:
      - url: https://learn.microsoft.com/en-us/microsoft-365-app-certification/sharepoint/cloudwell-team-members
        type: Microsoft 365 App Certification
    description: >-
      Team Members consolidates Microsoft 365 groups and Teams, SharePoint
      groups, and Azure AD groups and departments into a single view inside
      SharePoint. Distributed as an SPFx solution; no public REST API.
  - aid: cloudwell-opal:viva-announcements
    name: Cloudwell Viva Announcements
    tags:
      - SharePoint
      - Viva Connections
      - Announcements
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://cloudwell.io/products/viva-announcements/
    properties:
      - url: https://cloudwell.io/products/viva-announcements/
        type: Product Page
    description: >-
      Viva Announcements lets users view Viva Connections announcements
      anywhere in SharePoint via an SPFx web part. No public REST API.
